name: Build

on:
  push:
    branches:
      - master
  workflow_dispatch:

jobs:
  docker:
    runs-on: ubuntu-latest

    permissions:
      contents: read
      packages: write
      
    env:
      PLUGIN_NAME: ghcr.io/fernandodelucca/docker-network-dhcp
      PLATFORMS: linux/amd64,linux/386,linux/arm64,linux/arm/v7

    steps:
      - uses: actions/checkout@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Install script dependencies
        run: pip3 install -r scripts/requirements.txt

      - id: vars
        name: Generate build vars
        run: |
          SHA="${{ github.sha }}"
          echo "tag=${SHA:0:8}-$(date +%s)Z" >> $GITHUB_OUTPUT

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Export registry credentials
        run: |
          echo "REGISTRY_USERNAME=${{ github.actor }}" >> $GITHUB_ENV
          echo "REGISTRY_PASSWORD=${{ secrets.GITHUB_TOKEN }}" >> $GITHUB_ENV

      - name: Build
        run: make PLUGIN_TAG=${{ steps.vars.outputs.tag }} multiarch

      - name: Push
        run: |
          make PLUGIN_TAG=${{ steps.vars.outputs.tag }} push-multiarch
          scripts/tag_multiarch_plugin.py -p "$PLATFORMS" "$PLUGIN_NAME:${{ steps.vars.outputs.tag }}" latest
