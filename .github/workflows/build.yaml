name: Build

on:
  push:
    branches:
      - master
  pull_request:
  workflow_dispatch:

jobs:
  test:
    name: Test (race detector)
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Verify Go sources
        run: |
          go vet ./...
          go build ./...

      # The race detector requires CGO. ubuntu-latest already has gcc, so
      # CGO_ENABLED=1 is sufficient. Run with -count=1 to defeat the test
      # cache (we want every CI run to actually exercise the code).
      - name: Run unit tests with race detector
        run: |
          CGO_ENABLED=1 go test -race -count=1 -v ./...

  docker:
    name: Build & push Docker plugin
    needs: test
    runs-on: ubuntu-latest

    permissions:
      contents: read
      packages: write

    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
      PLUGIN_NAME: ghcr.io/fernandodelucca/docker-network-dhcp
      PLATFORMS: linux/amd64,linux/386,linux/arm64,linux/arm/v7

    # The image build only runs on master pushes — pull requests stop after the
    # test job. This keeps PR validation fast while ensuring releases ship with
    # tests passing.
    if: github.event_name != 'pull_request'

    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Install script dependencies
        run: pip3 install -r scripts/requirements.txt

      - id: vars
        name: Generate build vars
        run: |
          SHA="${{ github.sha }}"
          echo "tag=${SHA:0:8}-$(date +%s)Z" >> $GITHUB_OUTPUT

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Export registry credentials
        run: |
          echo "REGISTRY_USERNAME=${{ github.actor }}" >> $GITHUB_ENV
          echo "REGISTRY_PASSWORD=${{ secrets.GITHUB_TOKEN }}" >> $GITHUB_ENV

      - name: Build
        run: make PLUGIN_TAG=${{ steps.vars.outputs.tag }} multiarch

      - name: Push
        run: |
          make PLUGIN_TAG=${{ steps.vars.outputs.tag }} push-multiarch
          scripts/tag_multiarch_plugin.py -p "$PLATFORMS" "$PLUGIN_NAME:${{ steps.vars.outputs.tag }}" latest
